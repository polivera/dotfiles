[module/wired-network]
type = internal/network
interface = enp4s0
interval = 3.0

; Accumulate values from all interfaces
; when querying for up/downspeed rate
; Default: false
accumulate-stats = true

; Consider an `UNKNOWN` interface state as up.
; Some devices like USB network adapters have 
; an unknown state, even when they're running
; Default: false
unknown-as-up = false

; Available tags:
;   <label-connected> (default)
;   <ramp-signal>
format-connected = <label-connected>

; Available tags:
;   <label-disconnected> (default)
format-disconnected = <label-disconnected>

; Available tags:
;   <label-connected> (default)
;   <label-packetloss>
;   <animation-packetloss>
format-packetloss = <animation-packetloss> <label-connected>

; All labels support the following tokens:
;   %ifname%    [wireless+wired]
;   %local_ip%  [wireless+wired]
;   %local_ip6% [wireless+wired]
;   %essid%     [wireless]
;   %signal%    [wireless]
;   %upspeed%   [wireless+wired]
;   %downspeed% [wireless+wired]
;   %linkspeed% [wired]

; Default: %ifname% %local_ip%
label-connected = %{T3}%{T-}
label-connected-foreground = ${colors.fg}

; Default: (none)
label-disconnected = %{T3}%{T-}
label-disconnected-foreground = ${colors.fg-alt}

animation-packetloss-0 = ⚠
animation-packetloss-0-foreground = ${colors.fg}
animation-packetloss-1 = ⚠
animation-packetloss-1-foreground = ${colors.alert}
animation-packetloss-framerate = 500


;; ---------------------------------------------------------------
[module/wireless-network]
type = internal/network
interface = wlp3s0
interval = 3.0

;udspeed-minwidth = 5
accumulate-stats = true
unknown-as-up = true
format-connected = %{T3}<ramp-signal>%{T-} <label-connected>
format-disconnected = %{T3}<label-disconnected>%{T-}
format-packetloss = <animation-packetloss> <label-connected>

label-connected = %essid% 
label-connected-foreground = ${colors.fg}

label-disconnected = ${icons.wifi-off}
label-disconnected-foreground = ${colors.fg-alt}

ramp-signal-0 = ${icons.wifi-on}
ramp-signal-1 = ${icons.wifi-on}
ramp-signal-2 = ${icons.wifi-on}
ramp-signal-3 = ${icons.wifi-on}
ramp-signal-4 = ${icons.wifi-on}
ramp-signal-5 = ${icons.wifi-on}
ramp-signal-0-foreground = ${colors.red}
ramp-signal-1-foreground = ${colors.red}
ramp-signal-2-foreground = ${colors.orange}
ramp-signal-3-foreground = ${colors.yellow}
ramp-signal-4-foreground = ${colors.yellow}
ramp-signal-5-foreground = ${colors.green}

animation-packetloss-0 = ⚠
animation-packetloss-0-foreground = ${colors.fg}
animation-packetloss-1 = ⚠
animation-packetloss-1-foreground = ${colors.alert}
animation-packetloss-framerate = 500


;; ---------------------------------------------------------------
[module/wired-net-info]
type = internal/network
interface = enp4s0
interval = 3.0

accumulate-stats = true
unknown-as-up = true
format-connected = <label-connected>
;format-disconnected = %{T3}<label-disconnected>%{T-}

label-connected = %{T3}%{T-} %local_ip% 
label-connected-foreground = ${colors.fg}


;; ---------------------------------------------------------------
[module/wireless-net-info]
type = internal/network
interface = wlp3s0
interval = 3.0

accumulate-stats = true
unknown-as-up = true
format-connected = <label-connected>

label-connected = %{T3}%{T-} %local_ip% 
label-connected-foreground = ${colors.fg}


;; ---------------------------------------------------------------
[module/vpn]
type = internal/network
interface = tun0
interval = 3.0

label-connected = %{T3}ﱱ%{T-}
label-connected-foreground = ${colors.fg}

