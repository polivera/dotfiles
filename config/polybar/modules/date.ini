[module/date]
type = internal/date
interval = once
date = %d/%m
format = <label>
format-background = ${colors.bg} 
format-foreground = ${colors.fg}
format-padding = 1
label = %{T3}%{T-} %date%

[module/time]
type = internal/date
interval = 1.0
time = %H:%M
format-background = ${colors.bg} 
format-foreground = ${colors.fg}
format-padding = 1
label = %{T3}%{T-} %time%
